name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        # macos-15-intel retired 2026-06 (org Intel-Mac retirement; sumpter is
        # the first arm-only formula). Intel macOS binaries still shipped by
        # goneat/dimlox/refbolt are no longer exercised in CI.
        os: [ ubuntu-24.04, macos-latest ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@2ebcf16054461267868620b1414507f3ccc765c1 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      # Homebrew now gates third-party taps behind tap trust; an untrusted tap
      # fails `brew doctor` inside `test-bot --only-setup`.
      - name: Trust this tap
        run: brew trust fulmenhq/tap

      - name: Clean Homebrew core tap
        run: |
          CORE_TAP="$(brew --repository homebrew/core)"
          if [ -d "$CORE_TAP" ]; then
            echo "Cleaning homebrew-core at $CORE_TAP"
            git -C "$CORE_TAP" reset --hard HEAD
            git -C "$CORE_TAP" clean -fd
          else
            echo "homebrew-core not present at $CORE_TAP (fresh environment)"
          fi

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
